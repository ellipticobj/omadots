source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

label {
    monitor =
    text = $TIME
    
    color = $font_color
    font_size = 400
    font_family = Adwaita Sans Extrabold

    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    position = 0, -300
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 1

    font_family = AnonymicePro Nerd Font
    font_color = $font_color

    placeholder_text = <span> Enter Password 󰈷 </span>
    check_color = $check_color
    fail_text = <i>wrong password</i>
    fail_transition = 5

    rounding = 10
    shadow_passes = 0
    fade_on_empty = true
}

auth {
    fingerprint:enabled = true
}
