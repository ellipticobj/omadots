[meta]
version = 1
name = "Omarchy"
description = "Follow your Omarchy system theme."
variant = "dark"
inherits = "vicinae-dark"
icon = "/home/luna/.local/share/omarchy/icon.png"

[colors.core]
background = "#05010C"
foreground = "#FFFFFF"
secondary_background = "#0a0611"
