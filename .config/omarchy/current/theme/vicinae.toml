[colors.accents]
blue = "#BB9AF7"
green = "#C2B8FF"
magenta = "#B49AE6"
orange = "#DDCCFF"
purple = "#C4AAF0"
red = "#F07178"
yellow = "#D1BFF7"
cyan = "#A6B8FF"
